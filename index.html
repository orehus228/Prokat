<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Прокатошная">
<meta name="theme-color" content="#1a1a1a">
<title>Прокатошная</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Roboto,system-ui,-apple-system,sans-serif;background:#1a1a1a;padding:12px;color:#d0d0d0;min-height:100vh;touch-action:manipulation}
.app{max-width:1400px;margin:0 auto}
.card{background:#252525;padding:14px;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,0.5);margin-bottom:14px;border:1px solid #333}
.btn{background:#333;color:#d0d0d0;border:1px solid #444;padding:14px 12px;border-radius:10px;font-weight:bold;cursor:pointer;width:100%;display:block;text-align:center;font-size:16px;margin-bottom:10px;transition:all .2s;touch-action:manipulation;min-height:48px}
.btn:hover{opacity:.85;transform:translateY(-1px);background:#3a3a3a}
.btn:active{transform:scale(.98)}
.btn-green{background:#2d6a3d;border-color:#3a8a4a;color:#e8f0e8}
.btn-green:hover{background:#3a7a4a}
.btn-sec{background:#333;border-color:#444}
.btn-red{background:#6a2a2a;border-color:#8a3a3a;color:#f0e0e0}
.btn-red:hover{background:#7a3a3a}
.btn-orange{background:#6a4a2a;border-color:#8a6a3a;color:#f0e8e0}
.btn-orange:hover{background:#7a5a3a}
.btn-sm{padding:8px 14px;font-size:14px;width:auto;display:inline-block;margin:0;min-height:40px}
.btn-purple{background:#4a3a5a;border-color:#6a4a7a;color:#e8e0f0}
.btn-purple:hover{background:#5a4a6a}
.input-field,.input-textarea{width:100%;padding:12px;border:1px solid #3a3a3a;border-radius:8px;margin-bottom:10px;font-size:16px;background:#1e1e1e;color:#d0d0d0;font-family:inherit;-webkit-appearance:none}
.input-field::placeholder,.input-textarea::placeholder{color:#777}
.input-field:focus,.input-textarea:focus{outline:none;border-color:#5a8aaa}
.input-textarea{min-height:60px;resize:vertical}
.category-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;border-bottom:2px solid #333;padding-bottom:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.category-tab{padding:10px 16px;border-radius:10px 10px 0 0;background:#2a2a2a;cursor:pointer;font-weight:500;transition:all .2s;color:#aaa;white-space:nowrap;touch-action:manipulation;min-height:44px;display:flex;align-items:center}
.category-tab.active{background:#3a3a3a;color:#e8e8e8}
.category-tab:hover:not(.active){background:#333}
.category-content{display:none;animation:fadeIn .25s}
.category-content.active{display:block}
@keyframes fadeIn{from{opacity:.4}to{opacity:1}}
.category-container{margin-bottom:15px;border:1px solid #333;border-radius:10px;overflow:hidden}
.category-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;user-select:none;background:#2a2a2a;border-left:5px solid #5a8aaa;min-height:48px}
.category-header:hover{opacity:.85}
.category-header .cat-title{font-size:17px;font-weight:bold;color:#d0d0d0}
.category-header .cat-toggle{font-size:20px;transition:transform .3s;margin-left:10px}
.category-header .cat-toggle.collapsed{transform:rotate(-90deg)}
.category-body{padding:10px 12px;background:#252525}
.category-body.collapsed{display:none}
.row{display:flex;flex-direction:column;padding:8px 0;border-bottom:1px solid #2a2a2a;transition:background .15s}
.row-even{background:#1e1e1e}
.row-odd{background:#252525}
.row.hidden{display:none}
.row .main-line{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.row .name-area{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1 1 160px}
.row .name{font-size:14px;color:#ccc;word-break:break-word}
.row .controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.controls input[type="number"]{width:50px;padding:8px 4px;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;color:#d0d0d0;text-align:center;font-size:16px;min-height:40px}
.controls input[type="number"]:focus{outline:none;border-color:#5a8aaa}
.btn-c{width:40px;height:40px;border-radius:50%;border:1px solid #5a8aaa;background:#1a1a1a;color:#5a8aaa;font-size:20px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;touch-action:manipulation}
.btn-c:hover{background:#5a8aaa;color:#fff}
.case-input{border-color:#3a8a4a!important;background:#1a2a1a!important}
.selected-item{background:#1a2a2a!important;border-left:3px solid #3a8a4a;padding-left:5px}
.overstock{background:#2a1a1a!important;border-left:3px solid #c44;padding-left:5px}
.overstock .controls input[type="number"]{border-color:#c44}
.overstock-warning{color:#c44;font-size:12px;margin-left:10px}
.stock-info{font-size:12px;color:#777;margin-left:6px}
.dynamic-info{font-size:12px;color:#aaa;padding:2px 0 2px 10px;margin-left:10px;display:flex;gap:12px;flex-wrap:wrap;border-left:1px solid #3a3a3a}
.dynamic-info .hl{color:#d4a040}
.props-compact{font-size:12px;color:#888;padding:2px 0 2px 10px;border-left:2px solid #5a8aaa;margin-left:10px;display:none;gap:12px;flex-wrap:wrap}
.props-compact.visible{display:flex}
.props-compact span{white-space:nowrap}
.props-compact .na{color:#555}
.case-toggle{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#888;cursor:pointer;user-select:none;touch-action:manipulation}
.case-toggle input[type="checkbox"]{width:18px;height:18px;accent-color:#5a8aaa;cursor:pointer}
.desc-toggle{cursor:pointer;margin-left:6px;font-size:16px;opacity:.7;transition:.2s;background:0;border:0;color:#5a8aaa;padding:4px}
.desc-toggle:hover{opacity:1;color:#7aaaca}
.desc-block{display:none;padding:4px 10px;background:rgba(180,160,60,0.08);border-radius:6px;font-size:13px;color:#c8b870;margin:2px 0 2px 20px;border-left:2px solid #d4a040;font-style:italic}
.desc-block.open{display:block}
.link-btn{background:0;border:0;color:#5a8aaa;cursor:pointer;font-size:18px;padding:4px;transition:.2s;touch-action:manipulation}
.link-btn:hover{color:#7aaaca}
.link-btn.active{color:#d4a040}
.category-totals{margin-top:12px;padding:8px 12px;background:#1e1e1e;border-radius:8px;font-size:13px;color:#aaa;border:1px solid #333;display:flex;flex-wrap:wrap;gap:12px}
.category-totals strong{color:#d4a040}
.global-totals{margin-top:20px;padding:12px 14px;background:#2a2a2a;border-radius:10px;border:1px solid #3a3a3a;display:flex;flex-wrap:wrap;gap:16px;font-size:15px;color:#d0d0d0;position:relative}
.global-totals strong{color:#d4a040}
.global-totals .detail-btn{background:0;border:1px solid #5a8aaa;color:#5a8aaa;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;margin-left:auto;touch-action:manipulation;min-height:40px}
.global-totals .detail-btn:hover{background:#2a2a2a}
.global-details{display:none;width:100%;margin-top:10px;padding:10px;background:#1e1e1e;border-radius:8px;font-size:13px;color:#aaa;border:1px solid #333;flex-wrap:wrap;gap:12px}
.global-details.open{display:flex}
.global-details .cat-detail{flex:1 1 160px;padding:4px 8px;border-left:2px solid #5a8aaa}
.global-details .cat-detail strong{color:#d4a040}
.search-box{margin-bottom:15px;display:flex;gap:8px;align-items:center}
.search-box input{flex:1;padding:10px 12px;border:1px solid #3a3a3a;border-radius:8px;background:#1a1a1a;color:#d0d0d0;font-size:16px;min-height:44px;-webkit-appearance:none}
.search-box input:focus{outline:none;border-color:#5a8aaa}
.search-box .clear-btn{background:0;border:0;color:#888;cursor:pointer;font-size:22px;padding:8px;touch-action:manipulation}
.search-box .clear-btn:hover{color:#ddd}
.preset-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;padding:10px;background:#1e1e1e;border-radius:10px;border:1px solid #333;align-items:center}
.preset-bar select{padding:8px;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;color:#d0d0d0;flex:1;min-width:120px;min-height:40px;font-size:14px}
.preset-bar button{padding:6px 12px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;color:#ccc;cursor:pointer;font-size:13px;min-height:40px;touch-action:manipulation}
.preset-bar button:hover{background:#333}
.preset-bar .overlay-toggle{display:flex;align-items:center;gap:4px;font-size:13px;color:#aaa;cursor:pointer;touch-action:manipulation}
.preset-bar .overlay-toggle input{width:18px;height:18px;accent-color:#5a8aaa;cursor:pointer}
.sub-cat-t,.sub-sub-cat-t{font-weight:bold;margin:8px 0 4px 0;padding-left:10px;border-left:2px solid #5a8aaa}
.sub-cat-t{font-size:15px;color:#8a8a8a}
.sub-sub-cat-t{font-size:14px;color:#6a6a6a;padding-left:25px;border-left-color:#4a7a8a}
.sub-qty{color:#8a8a8a;font-size:14px}
.cat-progress-text{font-size:13px;color:#888}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2a2a2a;color:#d0d0d0;padding:12px 24px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid #3a3a3a;z-index:2000}
.toast.show{opacity:1}
.header{display:flex;align-items:center;gap:12px;margin-bottom:15px;padding:10px 14px;background:#1e1e1e;border-radius:14px;border:1px solid #333}
.header h1{margin:0;font-size:22px;color:#d0d0d0}
.header .logo{width:44px;height:44px;border-radius:12px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:22px;color:#777;flex-shrink:0}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:10px}
.modal-overlay.open{display:flex}
.modal{background:#252525;padding:16px;border-radius:14px;border:1px solid #3a3a3a;width:100%;max-width:95vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal h3{color:#d0d0d0;margin-bottom:12px;flex-shrink:0;font-size:18px}
.modal .filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.modal .filter-row input{flex:1;padding:8px 10px;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;color:#d0d0d0;min-height:40px;font-size:14px}
.modal .preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;flex-shrink:0;align-items:center}
.modal .preset-row select{padding:6px 8px;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;color:#d0d0d0;flex:1;min-width:100px;min-height:40px;font-size:13px}
.modal .preset-row button{padding:6px 10px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;color:#ccc;cursor:pointer;font-size:12px;min-height:36px;touch-action:manipulation}
.modal .preset-row button:hover{background:#333}
.modal .preset-row .overlay-toggle{display:flex;align-items:center;gap:4px;font-size:12px;color:#aaa;cursor:pointer}
.modal .preset-row .overlay-toggle input{width:16px;height:16px;accent-color:#5a8aaa;cursor:pointer}
.modal .table-wrap{flex:1;overflow:auto;border:1px solid #333;border-radius:8px;-webkit-overflow-scrolling:touch}
.modal .table-wrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.modal .table-wrap th,.modal .table-wrap td{border:1px solid #333;padding:4px 6px;text-align:center;min-width:50px;word-break:break-word}
.modal .table-wrap th{background:#2a2a2a;color:#aaa;font-weight:500;position:sticky;top:0;z-index:2}
.modal .table-wrap .source-label{text-align:left;font-weight:500;color:#ccc;white-space:nowrap}
.modal .table-wrap .empty-cell{color:#555;cursor:pointer;font-size:18px}
.modal .table-wrap .empty-cell:hover{color:#aaa;background:#2a2a2a}
.modal .table-wrap .cell-value{font-weight:bold;color:#d4a040;cursor:pointer}
.modal .table-wrap .cell-value:hover{color:#e0b060}
.modal .table-wrap .matrix-category td{background:#2a2a2a;padding:6px 10px;text-align:left;font-weight:bold;color:#ccc;cursor:pointer}
.modal .table-wrap .matrix-category-items{display:none}
.modal .table-wrap .matrix-category-items.open{display:table-row-group}
.modal .table-wrap .toggle{display:inline-block;transition:transform .2s;margin-right:6px}
.modal .table-wrap .toggle.collapsed{transform:rotate(-90deg)}
.modal .buttons{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;flex-shrink:0}
.modal .buttons button{padding:8px 16px;border:0;border-radius:8px;cursor:pointer;font-size:14px;min-height:40px;touch-action:manipulation}
.modal .buttons .cancel{background:#2a2a2a;color:#aaa}
.modal .buttons .danger{background:#5a2a2a;color:#f0d0d0}
.modal .buttons .danger:hover{background:#6a3a3a}
.progress-container{margin-top:20px;padding:15px;background:#1e1e1e;border-radius:10px;border:1px solid #333}
.progress-container strong{font-size:15px}
.progress-bar-bg{width:100%;background:#2a2a2a;height:12px;border-radius:6px;margin-top:8px;overflow:hidden}
.progress-bar-fill{width:0;background:#d4a040;height:12px;border-radius:6px;transition:width .4s ease}
.progress-bar-fill.complete{background:#d4a040}
.check-missing-btn{background:#2a2a2a;color:#d0d0d0;border:1px solid #5a8aaa;padding:12px 20px;border-radius:10px;cursor:pointer;font-size:16px;transition:.2s;width:100%;margin-top:15px;min-height:48px}
.check-missing-btn:hover{background:#333;border-color:#7aaaca}
.matrix-btn{background:#2a2a2a;color:#d0d0d0;border:1px solid #5a8aaa;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;display:inline-block;margin-bottom:10px;min-height:44px}
.matrix-btn:hover{background:#333;border-color:#7aaaca}
.item-info{font-size:12px;color:#aaa;padding:2px 0 2px 10px;margin-left:10px;display:flex;flex-wrap:wrap;gap:10px;border-left:1px solid #3a3a3a}
.item-info .label{color:#777}
.item-info .value{color:#d4a040}
.empty-message{color:#666;padding:8px 12px;font-style:italic}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2a2a2a;color:#d0d0d0;padding:12px 24px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid #3a3a3a;z-index:2000}
.toast.show{opacity:1}
@media(max-width:600px){
body{padding:8px}
.card{padding:12px}
.btn{padding:12px;font-size:15px;min-height:44px}
.btn-sm{padding:6px 12px;font-size:13px;min-height:36px}
.category-tab{padding:8px 12px;font-size:14px}
.category-header{padding:10px 12px}
.category-header .cat-title{font-size:16px}
.row{padding:6px 0}
.row .main-line{flex-direction:column;align-items:stretch}
.row .name-area{flex:1 1 auto}
.row .controls{justify-content:flex-end;flex-wrap:wrap}
.controls input[type="number"]{width:45px;padding:6px;font-size:15px;min-height:36px}
.btn-c{width:36px;height:36px;font-size:18px}
.case-toggle{font-size:12px}
.desc-toggle{font-size:14px}
.link-btn{font-size:16px}
.global-totals{flex-direction:column;gap:12px}
.global-totals .detail-btn{margin-left:0;align-self:flex-start}
.global-details .cat-detail{flex:1 1 100%}
.preset-bar select{font-size:13px;min-height:36px}
.preset-bar button{font-size:12px;padding:4px 10px;min-height:32px}
.search-box input{font-size:15px;min-height:40px}
.modal{padding:12px;max-width:100%;height:100vh;max-height:100vh;border-radius:0}
.modal .preset-row select{font-size:12px}
.modal .preset-row button{font-size:11px;padding:4px 8px;min-height:30px}
.modal .table-wrap table{font-size:11px;min-width:480px}
.modal .table-wrap th,.modal .table-wrap td{padding:3px 4px}
}
@media(max-width:400px){
body{padding:5px}
.card{padding:10px}
.btn{font-size:14px;padding:10px;min-height:40px}
.category-tab{padding:6px 10px;font-size:13px}
.row .controls{gap:4px}
.controls input[type="number"]{width:40px;font-size:14px;min-height:32px}
.btn-c{width:32px;height:32px;font-size:16px}
.preset-bar select{font-size:12px;min-height:32px}
.preset-bar button{font-size:11px;padding:4px 8px;min-height:28px}
.modal .table-wrap table{font-size:10px;min-width:360px}
.modal .preset-row button{font-size:10px;padding:2px 6px;min-height:24px}
}
@media (hover: none){
.btn:hover,.btn-c:hover,.category-tab:hover,.category-header:hover,.matrix-btn:hover,.preset-bar button:hover,.modal .preset-row button:hover,.check-missing-btn:hover,.add-item:hover,.search-box .clear-btn:hover{background:none;transform:none}
}
</style>
</head>
<body>
<div class="app">
<div class="header"><div class="logo">📦</div><h1>Прокатошная</h1></div>
<div class="card" id="mMenu" style="display:block;">
<h2 style="color:#aaa;">Выберите действие:</h2>
<button class="btn" onclick="sc('mPage')">📝 Создать список</button>
<button class="btn btn-sec" onclick="sc('sPage')">📂 Открыть список</button>
<button class="btn btn-orange" onclick="loadLibrary()">📥 Загрузить библиотеку</button>
</div>
<!-- Режим создания списка -->
<div id="mPage" class="card" style="display:none;">
<button class="btn btn-sec" onclick="sc('menu')">◀ В меню</button>
<h3 style="color:#aaa;">📝 Создание списка</h3>
<input type="text" id="pName" class="input-field" placeholder="Название мероприятия">
<input type="date" id="pDate" class="input-field">
<textarea id="pComment" class="input-textarea" placeholder="Комментарий"></textarea>
<div style="margin-bottom:15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
<button class="btn btn-purple" id="togglePropsBtn">📐 Показать свойства</button>
<span style="font-size:13px;color:#888;" id="propsStatus">(свойства скрыты)</span>
<button class="matrix-btn" onclick="openMatrixModal()">📊 Матрица привязок</button>
<span style="font-size:13px;color:#888;" id="linkCount">(0 активных)</span>
</div>
<div class="preset-bar">
<select id="orderPresetSelect"><option value="">— Выберите пресет —</option></select>
<button onclick="saveOrderPreset()">💾 Сохранить</button>
<button onclick="loadOrderPreset()">📂 Загрузить</button>
<button onclick="exportOrderPresets()">📤 Экспорт</button>
<button onclick="document.getElementById('orderPresetFileInput').click()">📥 Импорт</button>
<input type="file" id="orderPresetFileInput" style="display:none" accept=".json" onchange="importOrderPresets(event)">
<button onclick="deleteOrderPreset()" style="color:#c66;">🗑️ Удалить</button>
<label class="overlay-toggle"><input type="checkbox" id="orderOverlayToggle"> Наложение</label>
</div>
<div class="category-tabs" id="categoryTabs"></div>
<div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Глобальный поиск..." oninput="applySearch()"><button class="clear-btn" onclick="clearSearch()">✕</button></div>
<div id="categoryContents"></div>
<div id="globalTotals" class="global-totals">
<span><strong>Всего:</strong> <span id="totalQty">0</span> шт</span>
<span><strong>Вес:</strong> <span id="totalWeight">0</span> кг</span>
<span><strong>Объём:</strong> <span id="totalVolume">0</span> м³</span>
<button class="detail-btn" id="detailToggle">📊 Подробно</button>
<div class="global-details" id="globalDetails"></div>
</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:15px;">
<button class="btn btn-green" style="flex:1;min-width:120px;" onclick="saveJ()">💾 Сохранить JSON</button>
<button class="btn btn-orange" style="flex:1;min-width:120px;" onclick="savePdf()">📄 Сохранить PDF</button>
<button class="btn btn-red" style="flex:1;min-width:120px;" onclick="clearOrder()">🗑️ Очистить</button>
</div>
</div>
<!-- Режим открытия списка -->
<div id="sPage" style="display:none;">
<div class="card">
<button class="btn btn-sec" onclick="sc('menu')">◀ В меню</button>
<h3 style="color:#aaa;">📂 Открыть список</h3>
<label class="btn btn-sec" for="fSel">📎 Выберите JSON-файл</label>
<input type="file" id="fSel" style="display:none" accept=".json">
<div style="margin-top:10px;font-size:14px;color:#888;"><span id="loadStatus">Файл не выбран</span></div>
</div>
<div class="card" id="sRes" style="display:none;">
<h2 id="rName" style="color:#d0d0d0;">Мероприятие</h2>
<div id="rDate" style="color:#777;margin-bottom:10px;">📅 Дата:</div>
<div id="rComment" style="color:#888;margin-bottom:10px;font-style:italic;padding:8px;background:#1a1a1a;border-radius:8px;border-left:3px solid #c44;"></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
<button class="btn btn-red" style="width:auto;padding:8px 16px;font-size:14px;" onclick="resetCheckboxes()">🔄 Сброс отметок</button>
</div>
<div id="sCats"></div>
<div id="globalTotalsOpen" class="global-totals">
<span><strong>Общий вес:</strong> <span id="totalWeightOpen">0</span> кг</span>
<span><strong>Общий объём:</strong> <span id="totalVolumeOpen">0</span> м³</span>
</div>
<div class="progress-container">
<strong>Собрано:</strong>
<span id="progressCount">0/0</span>
<span id="progressPercent" style="margin-left:10px;color:#888;font-size:14px;">0%</span>

</div>
</div>
</div>
<!-- Модальные окна -->
<div class="modal-overlay" id="linkModal"><div class="modal"><h3>🔗 Привязки для <span id="linkSourceLabel"></span></h3><div id="linkList"></div><div style="margin-top:15px;border-top:1px solid #333;padding-top:15px;"><label>Добавить цель:</label><div style="display:flex;gap:8px;flex-wrap:wrap;"><select id="linkAddTarget" style="flex:2;min-width:150px;"></select><input type="number" id="linkAddMultiplier" value="1" step="0.1" style="flex:1;min-width:80px;"><button class="confirm" id="linkAddBtn">➕</button></div></div><div class="buttons"><button class="cancel" id="linkModalClose">Закрыть</button></div></div></div>
<div class="modal-overlay" id="matrixModal"><div class="modal" style="max-width:95vw;max-height:85vh;overflow:hidden;"><h3>📊 Матрица привязок</h3><div class="filter-row"><input type="text" id="matrixSearchSource" placeholder="🔍 Фильтр источников" oninput="renderMatrix()"><input type="text" id="matrixSearchTarget" placeholder="🔍 Фильтр целей" oninput="renderMatrix()"></div><div class="preset-row"><select id="presetSelect"><option value="">— Выберите пресет —</option></select><button onclick="savePreset()">💾 Сохранить</button><button onclick="loadPreset()">📂 Загрузить</button><button onclick="exportPresets()">📤 Экспорт</button><button onclick="document.getElementById('presetFileInput').click()">📥 Импорт</button><input type="file" id="presetFileInput" style="display:none" accept=".json" onchange="importPresets(event)"><button onclick="deletePreset()" style="color:#c66;">🗑️ Удалить</button><label class="overlay-toggle"><input type="checkbox" id="overlayToggle" checked> Наложение</label></div><div class="table-wrap" id="matrixContainer"></div><div class="buttons"><button class="danger" id="matrixClearAll">Удалить все привязки</button><button class="cancel" id="matrixClose">Закрыть</button></div></div></div>
<div class="toast" id="toast"></div>
</div>

<script>
// ============================================================
// ОБЩАЯ БАЗА ДАННЫХ (загружается из файла)
// ============================================================
let inventory = {};
let stock = {};
let specs = {};
let itemProps = {};
const CAT_NAMES = {
    "sound": "🔊 Звук",
    "light": "💡 Свет",
    "video": "🎥 Видео",
    "construct": "🏗️ Конструктив",
    "cables": "🔌 Коммутация",
    "extra": "📦 Другое"
};
let categoryOrder = [];

function loadCategoryOrder() {
    try { const s = localStorage.getItem('categoryOrder'); if (s) categoryOrder = JSON.parse(s); } catch(e) {}
    if (!categoryOrder || categoryOrder.length === 0) categoryOrder = Object.keys(inventory);
    const invKeys = Object.keys(inventory);
    categoryOrder = categoryOrder.filter(k => invKeys.includes(k));
    invKeys.forEach(k => { if (!categoryOrder.includes(k)) categoryOrder.push(k); });
    localStorage.setItem('categoryOrder', JSON.stringify(categoryOrder));
}
function saveCategoryOrder() { localStorage.setItem('categoryOrder', JSON.stringify(categoryOrder)); }

// ============================================================
// ЗАГРУЗКА БИБЛИОТЕКИ ИЗ ФАЙЛА
// ============================================================
function loadLibrary() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                if (data.inventory) inventory = data.inventory;
                if (data.stock) stock = data.stock;
                if (data.specs) specs = data.specs;
                if (data.itemProps) itemProps = data.itemProps;
                if (data.catNames) Object.assign(CAT_NAMES, data.catNames);
                if (data._categoryOrder) categoryOrder = data._categoryOrder;
                else loadCategoryOrder();
                saveLibraryToLocal();
                showToast('✅ Библиотека загружена');
                // Если мы в режиме создания, перерисовываем
                if (document.getElementById('mPage').style.display === 'block') {
                    renderOrderAll();
                }
            } catch(err) {
                showToast('❌ Ошибка: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

function saveLibraryToLocal() {
    localStorage.setItem('inventoryData', JSON.stringify(inventory));
    localStorage.setItem('stockData', JSON.stringify(stock));
    localStorage.setItem('specsData', JSON.stringify(specs));
    localStorage.setItem('itemPropsData', JSON.stringify(itemProps));
    saveCategoryOrder();
}

function loadLibraryFromLocal() {
    try { const s = localStorage.getItem('inventoryData'); if (s) inventory = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('stockData'); if (s) stock = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('specsData'); if (s) specs = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('itemPropsData'); if (s) itemProps = JSON.parse(s); } catch(e) {}
    loadCategoryOrder();
}

// ============================================================
// ОБЩИЕ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ============================================================
function esc(str) { return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}
function getItemProps(path) { return itemProps[path] || {}; }
function getCaseQty(path) { const p = getItemProps(path); return p.case_qty || 0; }
function calcItemWeight(path, qty) {
    const props = getItemProps(path);
    if (!props.weight) return 0;
    return props.weight * qty;
}
function calcItemVolume(path, qty) {
    const props = getItemProps(path);
    if (!props.dimensions) return 0;
    const dims = props.dimensions.split('x').map(s => parseFloat(s.trim()));
    if (dims.length !== 3 || dims.some(isNaN)) return 0;
    return (dims[0]*dims[1]*dims[2]) / 1000000 * qty;
}
function calcFullCaseWeight(path) {
    const props = getItemProps(path);
    if (!props.weight || !props.case_weight || !props.case_qty) return 0;
    return props.case_weight + (props.weight * props.case_qty);
}
function calcFullCaseVolume(path) {
    const props = getItemProps(path);
    if (!props.case_dimensions) return 0;
    const dims = props.case_dimensions.split('x').map(s => parseFloat(s.trim()));
    if (dims.length !== 3 || dims.some(isNaN)) return 0;
    return (dims[0]*dims[1]*dims[2]) / 1000000;
}
function getAllItemPaths() {
    const res = [];
    function traverse(obj, path) {
        if (Array.isArray(obj)) {
            obj.forEach(item => res.push(path.length ? path.join('|') + '|' + item : item));
        } else if (typeof obj === 'object' && obj !== null) {
            for (let key in obj) {
                if (key.startsWith('_')) continue;
                traverse(obj[key], [...path, key]);
            }
        }
    }
    traverse(inventory, []);
    return res;
}

// ============================================================
// НАВИГАЦИЯ
// ============================================================
function sc(page) {
    document.getElementById('mMenu').style.display = (page === 'menu') ? 'block' : 'none';
    document.getElementById('mPage').style.display = (page === 'mPage') ? 'block' : 'none';
    document.getElementById('sPage').style.display = (page === 'sPage') ? 'block' : 'none';
    if (page === 'mPage') {
        renderOrderAll();
    }
    if (page === 'sPage') {
        document.getElementById('sRes').style.display = 'none';
        document.getElementById('loadStatus').textContent = 'Файл не выбран';
        document.getElementById('fSel').value = '';
    }
}

// ============================================================
// РЕЖИМ СОЗДАНИЯ СПИСКА
// ============================================================
let order = {};
let links = {};
let currentOrderCategory = 'sound';
let showProps = false;
let caseModes = {};
let matrixCategoryState = {};
let linkPresets = {};
let orderPresets = {};
let detailsOpen = false;
let searchMode = false;
let searchQuery = '';

function loadOrderData() {
    try { const s = localStorage.getItem('order_data'); if (s) order = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('order_links'); if (s) { links = JSON.parse(s); for (let src in links) if (!Array.isArray(links[src])) links[src] = [links[src]]; } } catch(e) {}
    try { const s = localStorage.getItem('caseModes'); if (s) caseModes = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('showProps'); if (s) showProps = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('matrix_category_state'); if (s) matrixCategoryState = JSON.parse(s); } catch(e) {}
    try { const s = localStorage.getItem('linkPresets'); if (s) linkPresets = JSON.parse(s); else linkPresets = {}; } catch(e) { linkPresets = {}; }
    try { const s = localStorage.getItem('orderPresets'); if (s) orderPresets = JSON.parse(s); else orderPresets = {}; } catch(e) { orderPresets = {}; }
    try { const s = localStorage.getItem('detailsOpen'); if (s !== null) detailsOpen = JSON.parse(s); } catch(e) { detailsOpen = false; }
}
function saveOrderData() {
    localStorage.setItem('order_data', JSON.stringify(order));
    localStorage.setItem('order_links', JSON.stringify(links));
    localStorage.setItem('caseModes', JSON.stringify(caseModes));
    localStorage.setItem('showProps', JSON.stringify(showProps));
    localStorage.setItem('matrix_category_state', JSON.stringify(matrixCategoryState));
    localStorage.setItem('linkPresets', JSON.stringify(linkPresets));
    localStorage.setItem('orderPresets', JSON.stringify(orderPresets));
    localStorage.setItem('detailsOpen', JSON.stringify(detailsOpen));
    updateLinkCount();
}
function getValue(path) { return order[path] || 0; }
function setValue(path, val, skipLink) {
    val = Math.max(0, parseInt(val) || 0);
    if (order[path] === val) return;
    order[path] = val;
    if (!skipLink && links[path]) {
        links[path].forEach(link => {
            const targetVal = val * link.multiplier;
            setValue(link.target, targetVal, true);
        });
    }
    saveOrderData();
    updateRow(path);
    updateTotals();
    updateCategoryTotals(currentOrderCategory);
}
function updateRow(path) {
    const row = document.querySelector(`#categoryContents .row[data-path="${path}"]`);
    if (!row) return;
    const inp = row.querySelector('.qty-input');
    if (!inp) return;
    const val = getValue(path);
    inp.value = val;
    const sq = stock[path] !== undefined ? stock[path] : 9999;
    row.classList.toggle('selected-item', val > 0);
    row.classList.toggle('overstock', val > sq);
    const oldWarn = row.querySelector('.overstock-warning');
    if (oldWarn) oldWarn.remove();
    if (val > sq) {
        const warn = document.createElement('span');
        warn.className = 'overstock-warning';
        warn.textContent = `⚠️ Больше нет (в наличии ${sq})`;
        row.querySelector('.controls').appendChild(warn);
    }
    const cb = row.querySelector('.case-switch');
    const ci = row.querySelector('.case-input');
    const caseBtns = row.querySelectorAll('.case-btn');
    if (ci && cb) {
        const cq = getCaseQty(path);
        const modeOn = caseModes[path] || false;
        ci.style.display = modeOn ? 'inline-block' : 'none';
        caseBtns.forEach(btn => btn.style.display = modeOn ? 'flex' : 'none');
        cb.checked = modeOn;
        if (modeOn && cq > 0) ci.value = Math.floor(val / cq);
    }
    updateItemPropsDisplay(row, path);
}
function updateItemPropsDisplay(row, path) {
    const dynDiv = row.querySelector('.dynamic-info');
    if (!dynDiv) return;
    const props = getItemProps(path);
    const qty = getValue(path);
    const modeOn = caseModes[path] || false;
    const cq = props.case_qty || 0;
    const cases = modeOn && cq > 0 ? Math.floor(qty / cq) : 0;
    const remainder = qty - cases * cq;
    let weightDisplay = 'n/a', weightVal = 0;
    if (props.weight) {
        if (modeOn && cq > 0) {
            const fullCaseWeight = (props.case_weight || 0) + (cq * props.weight);
            weightVal = fullCaseWeight * cases + remainder * props.weight;
            weightDisplay = weightVal.toFixed(1) + ' кг' + (cases > 0 ? ` (вкл. ${cases} кофр)` : '');
        } else {
            weightVal = qty * props.weight;
            weightDisplay = weightVal.toFixed(1) + ' кг';
        }
    }
    let volumeDisplay = 'n/a', volumeVal = 0;
    if (modeOn && cq > 0 && cases > 0 && props.case_dimensions) {
        const dims = props.case_dimensions.split('x').map(s => parseFloat(s.trim()));
        if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
            volumeVal = (dims[0]*dims[1]*dims[2]) / 1000000 * cases;
        }
        if (props.dimensions) {
            const dims2 = props.dimensions.split('x').map(s => parseFloat(s.trim()));
            if (dims2.length === 3 && dims2.every(d => !isNaN(d) && d > 0)) {
                volumeVal += (dims2[0]*dims2[1]*dims2[2]) / 1000000 * remainder;
            }
        }
        volumeDisplay = volumeVal.toFixed(3) + ' м³';
    } else if (props.dimensions) {
        const dims = props.dimensions.split('x').map(s => parseFloat(s.trim()));
        if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
            volumeVal = (dims[0]*dims[1]*dims[2]) / 1000000 * qty;
            volumeDisplay = volumeVal.toFixed(3) + ' м³';
        }
    }
    let casesDisplay = '';
    if (modeOn && cq > 0) casesDisplay = `<span class="hl">📦 ${cases} кофр${cases>1?'а':''} (по ${cq} шт)</span>`;
    dynDiv.innerHTML = `<span>⚖️ ${weightDisplay}</span><span>📦 ${volumeDisplay}</span>${casesDisplay}`;
    const propsDiv = row.querySelector('.props-compact');
    if (propsDiv) {
        const weightStatic = props.weight ? props.weight + ' кг' : '<span class="na">n/a</span>';
        const dimsStatic = props.dimensions || '<span class="na">n/a</span>';
        let caseStatic = '';
        if (cq > 0) caseStatic = `📦 Кофр: ${cq} шт, вес пустого: ${props.case_weight||'n/a'} кг, габ: ${props.case_dimensions||'n/a'}`;
        propsDiv.innerHTML = `<span>⚖️ 1 шт: ${weightStatic}</span><span>📐 ${dimsStatic}</span>${caseStatic ? `<span>${caseStatic}</span>` : ''}`;
        propsDiv.classList.toggle('visible', showProps);
    }
}
function calcItemWeightWithMode(path, qty) {
    const props = getItemProps(path);
    if (!props.weight) return 0;
    const modeOn = caseModes[path] || false;
    const cq = props.case_qty || 0;
    if (modeOn && cq > 0) {
        const cases = Math.floor(qty / cq);
        const remainder = qty - cases * cq;
        const fullCaseWeight = (props.case_weight || 0) + (cq * props.weight);
        return fullCaseWeight * cases + remainder * props.weight;
    }
    return qty * props.weight;
}
function calcItemVolumeWithMode(path, qty) {
    const props = getItemProps(path);
    if (!props.dimensions) return 0;
    const modeOn = caseModes[path] || false;
    const cq = props.case_qty || 0;
    let volume = 0;
    if (modeOn && cq > 0) {
        const cases = Math.floor(qty / cq);
        const remainder = qty - cases * cq;
        if (props.case_dimensions) {
            const dims = props.case_dimensions.split('x').map(s => parseFloat(s.trim()));
            if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
                volume += (dims[0]*dims[1]*dims[2]) / 1000000 * cases;
            }
        }
        const dims = props.dimensions.split('x').map(s => parseFloat(s.trim()));
        if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
            volume += (dims[0]*dims[1]*dims[2]) / 1000000 * remainder;
        }
    } else {
        const dims = props.dimensions.split('x').map(s => parseFloat(s.trim()));
        if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
            volume = (dims[0]*dims[1]*dims[2]) / 1000000 * qty;
        }
    }
    return volume;
}
function calcItemCases(path, qty) {
    const cq = getCaseQty(path);
    if (cq === 0) return 0;
    const modeOn = caseModes[path] || false;
    if (!modeOn) return 0;
    return Math.floor(qty / cq);
}
function getActiveItems() {
    const items = [];
    for (let path in order) {
        if (order[path] > 0) items.push({ path, qty: order[path] });
    }
    return items;
}

function renderOrderTabs() {
    const container = document.getElementById('categoryTabs');
    container.innerHTML = '';
    const keys = categoryOrder.filter(k => inventory[k]);
    keys.forEach(key => {
        const tab = document.createElement('div');
        tab.className = 'category-tab' + (key === currentOrderCategory ? ' active' : '');
        tab.textContent = CAT_NAMES[key] || key;
        tab.dataset.cat = key;
        tab.addEventListener('click', () => {
            if (searchMode) { document.getElementById('searchInput').value = ''; searchMode = false; searchQuery = ''; }
            currentOrderCategory = key;
            renderOrderTabs();
            renderOrderCategory(key);
            setupDescToggles();
            setupInputListeners();
            setupCaseToggles();
            updateTotals();
            updateLinkCount();
        });
        container.appendChild(tab);
    });
}
function renderOrderCategory(catKey) {
    const container = document.getElementById('categoryContents');
    container.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.className = 'category-content active';
    if (catKey === 'all' || searchMode) {
        wrapper.innerHTML = buildAllCategoriesHTML();
    } else {
        const catData = inventory[catKey];
        if (!catData) return;
        wrapper.innerHTML = buildCategoryHTML(catData, [catKey], 0);
    }
    container.appendChild(wrapper);
    setupDescToggles();
    setupInputListeners();
    setupCaseToggles();
    document.querySelectorAll('#categoryContents .row').forEach(row => {
        const path = row.dataset.path;
        if (path) { updateRow(path); updateItemPropsDisplay(row, path); }
    });
    if (!searchMode) updateCategoryTotals(catKey);
    updateTotals();
    updateLinkCount();
    applySearch();
    if (detailsOpen) {
        document.getElementById('globalDetails').classList.add('open');
        document.getElementById('detailToggle').textContent = '📊 Скрыть';
    } else {
        document.getElementById('globalDetails').classList.remove('open');
        document.getElementById('detailToggle').textContent = '📊 Подробно';
    }
}
function buildAllCategoriesHTML() {
    let html = '';
    categoryOrder.forEach(cat => {
        const catData = inventory[cat];
        if (!catData) return;
        html += `<div class="sub-cat-t">${CAT_NAMES[cat]||cat}</div>`;
        html += buildCategoryHTML(catData, [cat], 0);
    });
    return html;
}
function buildCategoryHTML(data, path, level) {
    let html = '';
    if (Array.isArray(data)) {
        data.forEach((item, idx) => {
            const fullPath = path.length ? path.join('|') + '|' + item : item;
            const val = getValue(fullPath);
            const sq = stock[fullPath] !== undefined ? stock[fullPath] : 9999;
            const evenOdd = idx % 2 === 0 ? 'row-even' : 'row-odd';
            const desc = specs[fullPath] || '';
            const hasDesc = !!desc;
            const hasLink = links[fullPath] && links[fullPath].length > 0;
            const linkIcon = hasLink ? '🔗' : '⛓️';
            const props = getItemProps(fullPath);
            const cq = props.case_qty || 0;
            const showCase = cq > 0;
            const caseVal = showCase ? Math.floor(val / cq) : 0;
            const caseModeOn = caseModes[fullPath] || false;
            const dynHtml = `<div class="dynamic-info"></div>`;
            const staticHtml = `<div class="props-compact ${showProps ? 'visible' : ''}"></div>`;
            const escapedName = esc(item);
            const searchText = item + ' ' + (desc || '') + ' ' + (CAT_NAMES[path[0]] || '');
            html += `<div class="row ${evenOdd}" data-path="${esc(fullPath)}" data-search="${searchText.toLowerCase()}">
                <div class="main-line">
                    <div class="name-area">
                        <span class="name">${escapedName}</span>
                        ${hasDesc ? `<button class="desc-toggle" data-path="${esc(fullPath)}">📄</button>` : ''}
                        <button class="link-btn ${hasLink ? 'active' : ''}" onclick="openLinkModal('${esc(fullPath)}')" title="Настроить привязки">${linkIcon}</button>
                        ${showCase ? `<label class="case-toggle"><input type="checkbox" class="case-switch" data-path="${esc(fullPath)}" ${caseModeOn ? 'checked' : ''}> Режим кофров</label>` : ''}
                    </div>
                    <div class="controls">
                        <span class="stock-info">в наличии: ${sq}</span>
                        <button class="btn-c" onclick="chgPath('${esc(fullPath)}',-1,this)">−</button>
                        <input type="number" class="qty-input" value="${val}" min="0" step="1" data-path="${esc(fullPath)}">
                        <button class="btn-c" onclick="chgPath('${esc(fullPath)}',1,this)">+</button>
                        ${showCase ? `
                            <button class="btn-c case-btn" onclick="chgCase('${esc(fullPath)}',-1,this)" style="border-color:#3a8a4a;color:#3a8a4a;${caseModeOn ? '' : 'display:none;'}">−</button>
                            <input type="number" class="case-input" value="${caseVal}" min="0" step="1" data-path="${esc(fullPath)}" style="${caseModeOn ? '' : 'display:none;'}width:50px;padding:4px;border:1px solid #3a8a4a;background:#1a2a1a;border-radius:6px;color:#d0d0d0;text-align:center;font-size:14px;">
                            <button class="btn-c case-btn" onclick="chgCase('${esc(fullPath)}',1,this)" style="border-color:#3a8a4a;color:#3a8a4a;${caseModeOn ? '' : 'display:none;'}">+</button>
                        ` : ''}
                    </div>
                </div>
                ${dynHtml}
                ${staticHtml}
            </div>`;
            if (hasDesc) html += `<div class="desc-block" data-path="${esc(fullPath)}">📋 ${desc}</div>`;
            if (hasLink) {
                links[fullPath].forEach(link => {
                    html += `<div style="font-size:12px;color:#888;padding-left:${level*20+20}px;">🔗 → ${link.target} (×${link.multiplier})</div>`;
                });
            }
        });
        return html;
    } else if (typeof data === 'object' && data !== null) {
        const keys = Object.keys(data).filter(k => !k.startsWith('_'));
        keys.forEach(key => {
            const isSubSub = level >= 2;
            if (isSubSub) html += `<div class="sub-sub-cat-t">${key}</div>`;
            else html += `<div class="sub-cat-t">${key}</div>`;
            html += buildCategoryHTML(data[key], [...path, key], level + 1);
        });
        return html;
    }
    return '';
}

    const catItems = {};
    for (let path in data.items) {
        const parts = path.split('|');

        const qty = data.items[path];

        const cq = props.case_qty || 0;
        const cases = modeOn && cq > 0 ? Math.floor(qty / cq) : null;
        let totalWeight = 0;
        if (props.weight) {
            if (modeOn && cq > 0 && cases !== null && cases > 0) {
                const fullCaseWeight = (props.case_weight || 0) + (cq * props.weight);
                totalWeight = fullCaseWeight * cases + (qty - cases * cq) * props.weight;
            } else {
                totalWeight = qty * props.weight;
            }
        }
        let volume = 0;

                    const dims = props.case_dimensions.split('x').map(s => parseFloat(s.trim()));
                    if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
                        volume += (dims[0]*dims[1]*dims[2]) / 1000000 * cases;
                    }
                }
                const dims = props.dimensions.split('x').map(s => parseFloat(s.trim()));
                if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
                    volume += (dims[0]*dims[1]*dims[2]) / 1000000 * (qty - cases * cq);
                }
            } else {
                const dims = props.dimensions.split('x').map(s => parseFloat(s.trim()));
                if (dims.length === 3 && dims.every(d => !isNaN(d) && d > 0)) {
                    volume = (dims[0]*dims[1]*dims[2]) / 1000000 * qty;
                }
            }
        }
        const dimensions = (modeOn && cq > 0 && cases !== null && cases > 0 && props.case_dimensions) ? props.case_dimensions + ' (кофр)' : (props.dimensions || 'n/a');
        const comment = specs[path] || '';

    let grandQty=0,grandWeight=0,grandVolume=0,grandCases=0;

        if (!catItems[cat]) return;

    });

function renderOpenOrder(d) {

        for (let i = 0; i < parts.length; i++) {
            const p = parts[i];
            if (i === parts.length - 1) current[p] = d.items[path];
            else { if (!current[p]) current[p] = {}; current = current[p]; }
        }
    }

        let catWeight = 0, catVolume = 0;
        function collectStats(node, path) {
            for (let key in node) {
                const val = node[key];
                const currentPath = path.length ? path + '|' + key : key;
                if (typeof val === 'number') {
                    catWeight += calcItemWeight(currentPath, val);
                    catVolume += calcItemVolume(currentPath, val);

    document.querySelectorAll('#sCats .check-item').forEach(cb => {
        cb.addEventListener('change', function() { updateOpenProgress(); });
    });
    updateOpenProgress();
    restoreCategoryStates();
}
function buildOpenTree(node, level, category, pathArr) {
    let html = '', rowIndex = 0;
    for (let key in node) {
        const value = node[key];
        const currentPath = [...pathArr, key];
        const fullPath = currentPath.join('|');
        if (typeof value === 'number') {
            const rowClass = level === 0 ? '' : (level === 1 ? 'row-sub' : 'row-sub-sub');
            const evenOdd = rowIndex % 2 === 0 ? 'row-even' : 'row-odd';
            const description = specs[fullPath] || '';
            const hasDesc = !!description;
            const props = getItemProps(fullPath);
            const cq = getCaseQty(fullPath);
            const cases = cq > 0 ? Math.floor(value / cq) : 0;
            const qtyDisplay = `${value} шт${cq > 0 ? ` (${cases} кофр${cases>1?'а':''})` : ' (n/a)'}`;
            const totalWeight = calcItemWeight(fullPath, value);
            const totalVolume = calcItemVolume(fullPath, value);
            const unitWeight = props.weight ? props.weight : 0;
            const unitVolume = props.dimensions ? calcItemVolume(fullPath, 1) : 0;
            let caseInfo = '';
            if (cq > 0) {
                const fullCaseWeight = calcFullCaseWeight(fullPath);
                const fullCaseVolume = calcFullCaseVolume(fullPath);
                if (fullCaseWeight > 0 || fullCaseVolume > 0) {
                    caseInfo = ` | 1 кофр: ${fullCaseWeight.toFixed(1)} кг, ${fullCaseVolume.toFixed(3)} м³`;
                }
            }
            let infoParts = [];
            if (totalWeight > 0 || totalVolume > 0) infoParts.push(`всего: ${totalWeight.toFixed(1)} кг, ${totalVolume.toFixed(3)} м³`);
            if (unitWeight > 0 || unitVolume > 0) infoParts.push(`1 шт: ${unitWeight.toFixed(1)} кг, ${unitVolume.toFixed(3)} м³`);
            if (caseInfo) infoParts.push(caseInfo);
            const infoText = infoParts.length > 0 ? infoParts.join(' | ') : '';
            html += `<div class="row ${rowClass} ${evenOdd}" data-path="${fullPath}"><div class="main-line"><span><input type="checkbox" class="check-item" data-category="${category}">${esc(key)}${hasDesc ? `<span class="desc-toggle" onclick="toggleDescOpen(this)">📄</span>` : ''}</span><span class="sub-qty">${qtyDisplay}</span></div>${infoText ? `<div class="item-info">${infoText}</div>` : ''}</div>`;
            if (hasDesc) html += `<div class="desc-block" style="padding-left:${level*20+20}px;">📋 ${esc(description)}</div>`;
            rowIndex++;
        } else if (typeof value === 'object') {
            const isSubSub = level >= 2;
            if (isSubSub) html += `<div class="sub-sub-cat-t">${key}</div>`;
            else html += `<div class="sub-cat-t">${key}</div>`;
            html += buildOpenTree(value, level + 1, category, currentPath);
        }
    }
    return html;
}

    const body = header.nextElementSibling;
    const toggle = header.querySelector('.cat-toggle');
    if (body.classList.contains('collapsed')) {
        body.classList.remove('collapsed');
        toggle.classList.remove('collapsed');
        toggle.textContent = '▼';
    } else {
        body.classList.add('collapsed');
        toggle.classList.add('collapsed');
        toggle.textContent = '▶';
    }
    const container = header.closest('.category-container');
    if (container) {
        const cat = container.dataset.category;
        saveCategoryState(cat, body.classList.contains('collapsed'));
    }
}
function saveCategoryState(cat, collapsed) {
    try {
        const states = JSON.parse(localStorage.getItem('category_states') || '{}');
        states[cat] = collapsed;
        localStorage.setItem('category_states', JSON.stringify(states));
    } catch(e) {}
}
function restoreCategoryStates() {
    try {
        const states = JSON.parse(localStorage.getItem('category_states') || '{}');
        document.querySelectorAll('.category-container').forEach(container => {
            const cat = container.dataset.category;
            if (states[cat] === true) {
                const body = container.querySelector('.category-body');
                const toggle = container.querySelector('.cat-toggle');
                if (body) { body.classList.add('collapsed'); if (toggle) { toggle.classList.add('collapsed'); toggle.textContent = '▶'; } }
            }
        });
    } catch(e) {}
}
function updateOpenProgress() {
    const cbs = document.querySelectorAll('#sCats .check-item');
    const total = cbs.length;
    const checked = document.querySelectorAll('#sCats .check-item:checked').length;
    const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
    document.getElementById('progressCount').textContent = `${checked}/${total}`;
    document.getElementById('progressPercent').textContent = `${pct}%`;
    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.classList.toggle('complete', pct === 100);
    document.querySelectorAll('.category-container').forEach(container => {
        const items = container.querySelectorAll('.check-item');
        const totalCat = items.length;
        const checkedCat = container.querySelectorAll('.check-item:checked').length;
        const pctCat = totalCat > 0 ? Math.round((checkedCat / totalCat) * 100) : 0;
        const progressText = container.querySelector('.cat-progress-text');
        if (progressText) progressText.textContent = `${pctCat}% (${checkedCat}/${totalCat})`;
    });
}
function resetCheckboxes() {
    if (!confirm('Сбросить все отметки?')) return;
    document.querySelectorAll('#sCats .check-item').forEach(cb => cb.checked = false);
    updateOpenProgress();
    showToast('Отметки сброшены');
}
function checkMissingItems() {
    const cbs = document.querySelectorAll('#sCats .check-item');
    let missing = [];
    cbs.forEach(cb => {
        const row = cb.closest('.row');
        if (!row) return;
        if (!cb.checked) {
            const label = row.querySelector('span')?.textContent?.trim() || 'Без названия';
            const catKey = cb.dataset.category || 'unknown';
            const catName = CAT_NAMES[catKey] || catKey;
            const block = row.nextElementSibling;
            let desc = '';
            if (block && block.classList.contains('desc-block')) desc = block.textContent.replace(/[📋]/g, '').trim();
            let line = `[${catName}] ${label}`;
            if (desc) line += ` — ${desc}`;
            missing.push(line);
        }
    });
    let msg = missing.length === 0 ? '✅ Всё отмечено!' : `⚠️ Пропущены позиции (${missing.length}):\n\n${missing.join('\n')}\n\n📖 Напоминание: внимательно прочитайте все описания!`;
    alert(msg);
}

// ============================================================
// МАТРИЦА ПРИВЯЗОК
// ============================================================
function openMatrixModal() {
    document.getElementById('matrixModal').classList.add('open');
    document.getElementById('matrixSearchSource').value = '';
    document.getElementById('matrixSearchTarget').value = '';
    renderMatrix();
}
function renderMatrix() {
    const container = document.getElementById('matrixContainer');
    const allPaths = getAllItemPaths();
    if (allPaths.length === 0) { container.innerHTML = '<p style="color:#666;">Нет позиций</p>'; return; }
    const srcFilter = document.getElementById('matrixSearchSource').value.toLowerCase();
    const tgtFilter = document.getElementById('matrixSearchTarget').value.toLowerCase();
    const catMap = {};
    allPaths.forEach(p => {
        const parts = p.split('|');
        const cat = parts[0];
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push({ full: p, name: parts[parts.length-1] });
    });
    let allTargets = [];
    allPaths.forEach(p => {
        const parts = p.split('|');
        const cat = parts[0];
        const name = parts[parts.length-1];
        allTargets.push({ full: p, name, cat });
    });
    const unique = [];
    const seen = new Set();
    allTargets.forEach(t => { if (!seen.has(t.full)) { seen.add(t.full); unique.push(t); } });
    allTargets = unique;
    if (tgtFilter) allTargets = allTargets.filter(t => t.name.toLowerCase().includes(tgtFilter));
    let html = '<table><thead><tr><th>Источник \\ Цель</th>';
    allTargets.forEach(target => {
        html += `<th class="target-label">${target.name}<br><span style="font-weight:normal;font-size:10px;color:#888;">${CAT_NAMES[target.cat]||target.cat}</span></th>`;
    });
    html += '</tr></thead><tbody>';
    const catKeys = categoryOrder.filter(k => catMap[k]);
    catKeys.forEach((cat, catIdx) => {
        const items = catMap[cat];
        let filtered = items;
        if (srcFilter) filtered = items.filter(item => item.name.toLowerCase().includes(srcFilter));
        if (filtered.length === 0) return;
        const catId = 'cat_' + catIdx + '_' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
        const isOpen = matrixCategoryState[cat] || false;
        html += `<tr class="matrix-category" onclick="toggleMatrixCategory('${catId}','${cat}')"><td colspan="${allTargets.length+1}" style="text-align:left;padding:6px 12px;background:#2a2a2a;border:1px solid #2a2a2a;"><span class="toggle ${isOpen?'':'collapsed'}" id="toggle_${catId}">${isOpen?'▼':'▶'}</span> ${CAT_NAMES[cat]||cat} (${filtered.length})</td></tr>`;
        html += `<tbody id="${catId}" class="matrix-category-items ${isOpen?'open':''}">`;
        filtered.forEach((source, idx) => {
            const rowClass = idx % 2 === 0 ? 'row-even' : 'row-odd';
            html += `<tr class="${rowClass}"><td class="source-label">${source.name}</td>`;
            allTargets.forEach(target => {
                if (source.full === target.full) { html += `<td class="empty-cell">—</td>`; }
                else {
                    const link = links[source.full] ? links[source.full].find(l => l.target === target.full) : null;
                    const value = link ? link.multiplier : '';
                    if (value !== '') {
                        html += `<td data-src="${source.full}" data-target="${target.full}" onclick="editMatrixCell(this,'${source.full}','${target.full}')"><span class="cell-value">${value}</span></td>`;
                    } else {
                        html += `<td class="empty-cell" data-src="${source.full}" data-target="${target.full}" onclick="editMatrixCell(this,'${source.full}','${target.full}')">+</td>`;
                    }
                }
            });
            html += '</tr>';
        });
        html += '</tbody>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}
function toggleMatrixCategory(catId, catKey) {
    const tbody = document.getElementById(catId);
    if (!tbody) return;
    const toggle = document.getElementById('toggle_' + catId);
    if (tbody.classList.contains('open')) {
        tbody.classList.remove('open');
        toggle.classList.add('collapsed');
        toggle.textContent = '▶';
        matrixCategoryState[catKey] = false;
    } else {
        tbody.classList.add('open');
        toggle.classList.remove('collapsed');
        toggle.textContent = '▼';
        matrixCategoryState[catKey] = true;
    }
    localStorage.setItem('matrix_category_state', JSON.stringify(matrixCategoryState));
}
function editMatrixCell(td, src, target) {
    const existing = links[src] ? links[src].find(l => l.target === target) : null;
    const currentVal = existing ? existing.multiplier : '';
    const val = prompt(currentVal !== '' ? `Изменить множитель (текущий: ${currentVal})` : 'Введите множитель', currentVal !== '' ? currentVal : '1');
    if (val === null) return;
    const num = parseFloat(val);
    if (isNaN(num) || num === 0) {
        if (links[src]) { links[src] = links[src].filter(l => l.target !== target); if (links[src].length === 0) delete links[src]; }
    } else {
        if (!links[src]) links[src] = [];
        const existingLink = links[src].find(l => l.target === target);
        if (existingLink) existingLink.multiplier = num;
        else links[src].push({ target, multiplier: num });
    }
    saveOrderData();
    renderMatrix();
    document.querySelectorAll('#categoryContents .row').forEach(row => {
        const path = row.dataset.path;
        if (path) updateRow(path);
    });
    updateLinkCount();
    showToast('Привязка обновлена');
}
document.getElementById('matrixClearAll').addEventListener('click', () => {
    if (confirm('Удалить все привязки?')) {
        links = {};
        saveOrderData();
        renderMatrix();
        document.querySelectorAll('#categoryContents .row').forEach(row => {
            const path = row.dataset.path;
            if (path) updateRow(path);
        });
        updateLinkCount();
        showToast('Все привязки удалены');
    }
});
document.getElementById('matrixClose').addEventListener('click', () => {
    document.getElementById('matrixModal').classList.remove('open');
});

// Пресеты для матрицы
function updatePresetSelect() {
    const select = document.getElementById('presetSelect');
    select.innerHTML = '<option value="">— Выберите пресет —</option>';
    for (let name in linkPresets) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    }
}
function savePreset() {
    const name = prompt('Введите название пресета матрицы:');
    if (!name || name.trim() === '') return;
    if (linkPresets[name] && !confirm(`Пресет "${name}" уже существует. Перезаписать?`)) return;
    linkPresets[name] = JSON.parse(JSON.stringify(links));
    saveOrderData();
    updatePresetSelect();
    showToast(`Пресет матрицы "${name}" сохранён`);
}
function loadPreset() {
    const select = document.getElementById('presetSelect');
    const name = select.value;
    if (!name || !linkPresets[name]) { showToast('Выберите пресет'); return; }
    const overlay = document.getElementById('overlayToggle').checked;
    if (!overlay) {
        if (!confirm(`Загрузить пресет "${name}"? Текущие привязки будут заменены.`)) return;
        links = JSON.parse(JSON.stringify(linkPresets[name]));
    } else {
        const preset = linkPresets[name];
        for (let src in preset) {
            if (!links[src]) links[src] = [];
            preset[src].forEach(link => {
                const existing = links[src].find(l => l.target === link.target);
                if (existing) existing.multiplier += link.multiplier;
                else links[src].push(JSON.parse(JSON.stringify(link)));
            });
        }
    }
    saveOrderData();
    renderMatrix();
    document.querySelectorAll('#categoryContents .row').forEach(row => {
        const path = row.dataset.path;
        if (path) updateRow(path);
    });
    updateLinkCount();
    showToast(`Пресет матрицы "${name}" загружен${overlay ? ' (наложение, суммирование)' : ''}`);
}
function exportPresets() {
    if (Object.keys(linkPresets).length === 0) { showToast('Нет пресетов'); return; }
    const data = JSON.stringify(linkPresets, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'link_presets.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Пресеты матрицы экспортированы');
}
function importPresets(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (typeof imported === 'object' && imported !== null) {
                for (let name in imported) {
                    if (linkPresets[name] && !confirm(`Пресет "${name}" уже существует. Заменить?`)) continue;
                    linkPresets[name] = imported[name];
                }
                saveOrderData();
                updatePresetSelect();
                renderMatrix();
                showToast('Пресеты матрицы импортированы');
            } else showToast('Неверный формат файла');
        } catch(err) { showToast('Ошибка: '+err.message); }
    };
    reader.readAsText(file);
    event.target.value = '';
}
function deletePreset() {
    const select = document.getElementById('presetSelect');
    const name = select.value;
    if (!name || !linkPresets[name]) { showToast('Выберите пресет'); return; }
    if (!confirm(`Удалить пресет матрицы "${name}"?`)) return;
    delete linkPresets[name];
    saveOrderData();
    updatePresetSelect();
    renderMatrix();
    showToast(`Пресет матрицы "${name}" удалён`);
}

function loadOrderPreset() {
    const select = document.getElementById('orderPresetSelect');
    const name = select.value;
    if (!name || !orderPresets[name]) { showToast('Выберите пресет'); return; }
    const overlay = document.getElementById('orderOverlayToggle').checked;
    const preset = orderPresets[name];
    if (!overlay) {
        if (!confirm(`Загрузить пресет "${name}"? Текущий заказ будет заменён.`)) return;
        order = JSON.parse(JSON.stringify(preset.order));
        caseModes = JSON.parse(JSON.stringify(preset.caseModes || {}));

        for (let path in preset.order) {
            order[path] = (order[path] || 0) + preset.order[path];

        for (let path in preset.caseModes) {
            caseModes[path] = preset.caseModes[path];
        }
    }
    saveOrderData();
    renderOrderAll();
    showToast(`Пресет заказа "${name}" загружен${overlay ? ' (наложение, суммирование)' : ''}`);
}
