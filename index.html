<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прокатошная</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
    <!-- Шапка -->
    <div class="header">
        <div class="logo">📦</div>
        <h1>Прокатошная</h1>
    </div>

    <!-- Главное меню -->
    <div id="mMenu" class="card">
        <h2 style="color:#aaa;font-weight:500;margin-bottom:12px;">Выберите действие:</h2>
        <div class="menu-grid">
            <button class="btn" id="btnMenuOrder">📝 Создать список</button>
            <button class="btn btn-sec" id="btnMenuOpen">📂 Открыть список</button>
            <button class="btn btn-orange" id="btnMenuEditor">📦 Редактор склада</button>
            <button class="btn btn-purple" id="btnMenuLoadLibrary">📥 Загрузить библиотеку</button>
            <button class="btn btn-red" id="btnMenuReset">🔄 Сбросить данные</button>
        </div>
    </div>

    <!-- Страница создания заказа -->
    <div id="orderPage" class="card" style="display:none;">
        <button class="btn btn-sec" id="btnBackToMenu">◀ В меню</button>
        <h3 style="color:#d0d0d0;font-weight:600;margin-bottom:12px;">📝 Создание списка</h3>
        <input type="text" id="pName" class="input-field" placeholder="Название мероприятия">
        <input type="date" id="pDate" class="input-field">
        <textarea id="pComment" class="input-field" style="min-height:60px;" placeholder="Комментарий"></textarea>
        <div style="margin-bottom:15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
            <button class="btn btn-purple" id="togglePropsBtn">📐 Показать свойства</button>
            <span style="font-size:14px;color:#888;" id="propsStatus">(свойства скрыты)</span>
            <button class="btn btn-purple" id="btnMatrix">📊 Матрица привязок</button>
            <span style="font-size:14px;color:#888;" id="linkCount">(0 активных)</span>
            <button class="btn btn-purple" id="btnCommonCases">📦 Общие кофры</button>
        </div>
        <div class="preset-bar">
            <select id="orderPresetSelect"><option value="">— Выберите пресет —</option></select>
            <button id="btnSavePreset">💾 Сохранить</button>
            <button id="btnLoadPreset">📂 Загрузить</button>
            <button id="btnExportPresets">📤 Экспорт</button>
            <button id="btnImportPresets">📥 Импорт</button>
            <input type="file" id="presetFileInput" style="display:none" accept=".json">
            <button id="btnDeletePreset" style="color:#a07070;">🗑️ Удалить</button>
        </div>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Глобальный поиск...">
            <button class="clear-btn" id="clearSearchBtn">✕</button>
        </div>
        <div id="categoryContents"></div>
        <div id="globalTotals" class="global-totals">
            <span><strong>Всего:</strong> <span id="totalQty">0</span> шт</span>
            <span><strong>Вес:</strong> <span id="totalWeight">0</span> кг</span>
            <span><strong>Объём:</strong> <span id="totalVolume">0</span> м³</span>
            <button class="btn btn-sm" id="detailToggle">📊 Подробно</button>
            <div class="global-details" id="globalDetails"></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:15px;">
            <button class="btn btn-green" style="flex:1;" id="btnSaveJSON">💾 Сохранить JSON</button>
            <button class="btn btn-orange" style="flex:1;" id="btnSavePDF">📄 Сохранить PDF</button>
            <button class="btn btn-red" style="flex:1;" id="btnClearOrder">🗑️ Очистить</button>
        </div>
    </div>

    <!-- Страница открытия заказа -->
    <div id="openPage" style="display:none;">
        <div class="card">
            <button class="btn btn-sec" id="btnBackToMenu2">◀ В меню</button>
            <h3 style="color:#d0d0d0;font-weight:600;margin-bottom:12px;">📂 Открыть список</h3>
            <label class="btn btn-sec" for="fSel">📎 Выберите JSON-файл</label>
            <input type="file" id="fSel" style="display:none" accept=".json">
            <div style="margin-top:12px;font-size:14px;color:#888;"><span id="loadStatus">Файл не выбран</span></div>
        </div>
        <div class="card" id="sRes" style="display:none;">
            <h2 id="rName">Мероприятие</h2>
            <div id="rDate" style="color:#888;margin-bottom:10px;">📅 Дата:</div>
            <div id="rComment" style="color:#aaa;margin-bottom:12px;font-style:italic;padding:10px;background:#1e1e1e;border-radius:10px;"></div>
            <button class="btn btn-red" style="width:auto;padding:8px 18px;font-size:14px;" id="resetCheckboxes">🔄 Сброс отметок</button>
            <div id="sCats"></div>
            <div id="globalTotalsOpen" class="global-totals">
                <span><strong>Общий вес:</strong> <span id="totalWeightOpen">0</span> кг</span>
                <span><strong>Общий объём:</strong> <span id="totalVolumeOpen">0</span> м³</span>
            </div>
            <div class="progress-container">
                <strong>Собрано:</strong> <span id="progressCount">0/0</span>
                <span id="progressPercent" style="margin-left:10px;color:#888;">0%</span>
                <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill" style="width:0%;"></div></div>
                <button class="btn" id="checkMissingItems">🔍 Проверить пропущенное</button>
            </div>
        </div>
    </div>

    <!-- Страница редактора склада -->
    <div id="editorPage" style="display:none;">
        <div class="card">
            <button class="btn btn-sec" id="btnBackToMenu3">◀ В меню</button>
            <h3 style="color:#d0d0d0;font-weight:600;margin-bottom:12px;">📦 Редактор склада</h3>
            <div class="toolbar">
                <button id="exportBtn">📤 Экспорт JSON</button>
                <button id="importBtn">📥 Импорт JSON</button>
                <button id="resetBtn">🔄 Сброс</button>
                <button id="manageCasesBtn">📦 Общие кофры</button>
            </div>
            <input type="file" id="importFile" style="display:none" accept=".json">
            <div class="category-tabs" id="editorTabs"></div>
            <div id="editorContents"></div>
            <div class="editor-add">
                <input type="text" id="newCategoryName" placeholder="Новая категория">
                <button class="btn btn-green" id="addCategoryBtn">➕ Добавить категорию</button>
            </div>
        </div>
    </div>

    <!-- Модалки (те же) -->
    <!-- ... (остаются без изменений) ... -->
    <!-- ... (modalOverlay, propsModal, casesManagerModal, matrixModal, toast) ... -->
</div>

<!-- Подключаем главный модуль -->
<script type="module" src="js/main.js"></script>
</body>
</html>
